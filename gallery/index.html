<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manim.js — examples</title>
    <style>
      :root {
        --paper: #fbfaf6;
        --ink: #20242e;
        --soft: #5a6072;
        --indigo: #5b5bd6;
        --line: #e4e0d6;
        --editor-bg: #1f2430;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        background: #eceae2;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 12px 18px;
        background: #f6f4ee;
        border-bottom: 1px solid var(--line);
      }
      header h1 { font-size: 17px; margin: 0; font-weight: 800; letter-spacing: -0.3px; }
      header h1 span { color: var(--indigo); }
      header .install {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px; background: var(--ink); color: #e8eaf0;
        padding: 6px 12px; border-radius: 8px;
      }
      header .links { margin-left: auto; display: flex; gap: 10px; }
      header .links a { font-size: 13px; font-weight: 600; color: var(--ink); text-decoration: none; }

      #tabs {
        display: flex; gap: 6px; padding: 10px 14px; overflow-x: auto;
        background: #f1efe8; border-bottom: 1px solid var(--line);
      }
      #tabs button {
        font: inherit; font-size: 13px; font-weight: 600; white-space: nowrap;
        border: 1px solid var(--line); background: #fff; color: var(--soft);
        padding: 6px 14px; border-radius: 999px; cursor: pointer;
      }
      #tabs button.active { background: var(--indigo); color: #fff; border-color: var(--indigo); }

      main { flex: 1; display: flex; min-height: 0; }
      .pane { display: flex; flex-direction: column; min-width: 0; }
      .editor { width: 50%; border-right: 1px solid var(--line); background: var(--editor-bg); }
      .preview { flex: 1; background: var(--paper); }

      .bar {
        display: flex; align-items: center; gap: 10px;
        padding: 8px 12px; background: #181c26; border-bottom: 1px solid #2c3344;
      }
      .bar .file {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12.5px; color: #aab1c4;
      }
      .bar .spacer { flex: 1; }
      .bar button {
        font: inherit; font-size: 12px; font-weight: 600;
        border: 1px solid #3a4256; background: #2a3142; color: #e8eaf0;
        padding: 5px 12px; border-radius: 7px; cursor: pointer;
      }
      .bar button.primary { background: var(--indigo); border-color: var(--indigo); }

      #code {
        flex: 1; resize: none; border: 0; outline: 0; padding: 14px;
        background: var(--editor-bg); color: #e8eaf0;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12.5px; line-height: 1.55; tab-size: 2; white-space: pre; overflow: auto;
      }
      #preview { width: 100%; height: 100%; border: 0; display: block; }

      @media (max-width: 820px) {
        main { flex-direction: column; }
        .editor { width: 100%; height: 50%; border-right: 0; border-bottom: 1px solid var(--line); }
        .preview { height: 50%; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Manim<span>.js</span> &middot; examples</h1>
      <span class="install">npm i @agarwal29796/manim-js</span>
      <span class="links">
        <a href="https://www.npmjs.com/package/@agarwal29796/manim-js">npm</a>
        <a href="https://github.com/agarwal29796/manim-js">GitHub</a>
        <a href="studio/index.html">Studio →</a>
      </span>
    </header>

    <div id="tabs"></div>

    <main>
      <section class="pane editor">
        <div class="bar">
          <span class="file" id="filename">demo.html</span>
          <span class="spacer"></span>
          <button id="copy" class="primary">Copy</button>
          <button id="open">Open ↗</button>
          <button id="reset">Reset</button>
        </div>
        <textarea id="code" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
      </section>
      <section class="pane preview">
        <iframe id="preview" sandbox="allow-scripts" title="preview"></iframe>
      </section>
    </main>

    <script src="bundle.js"></script>
  </body>
</html>
