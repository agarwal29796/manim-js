<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manim.js — gallery</title>
    <style>
      :root {
        --paper: #fbfaf6;
        --ink: #20242e;
        --soft: #5a6072;
        --indigo: #5b5bd6;
        --line: #e4e0d6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #efece4;
        color: var(--ink);
      }
      header {
        text-align: center;
        padding: 56px 20px 36px;
        background:
          radial-gradient(ellipse at 50% -20%, rgba(91, 91, 214, 0.14), transparent 60%),
          #f5f3ec;
        border-bottom: 1px solid var(--line);
      }
      header h1 { font-size: 44px; margin: 0; letter-spacing: -1px; font-weight: 800; }
      header h1 span { color: var(--indigo); }
      header p { color: var(--soft); font-size: 18px; margin: 10px 0 22px; }
      .install {
        display: inline-block;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 14px;
        background: var(--ink);
        color: #e8eaf0;
        padding: 10px 18px;
        border-radius: 10px;
      }
      .links { margin-top: 18px; display: flex; gap: 12px; justify-content: center; }
      .links a {
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
        border: 1px solid var(--line);
        background: #fff;
        padding: 8px 16px;
        border-radius: 8px;
      }
      .links a.primary { background: var(--indigo); color: #fff; border-color: var(--indigo); }

      main { max-width: 1240px; margin: 0 auto; padding: 36px 20px 80px; }
      #grid {
        display: grid;
        gap: 22px;
        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
      }
      .card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(32, 36, 46, 0.06);
        display: flex;
        flex-direction: column;
      }
      canvas.stage {
        width: 100%;
        aspect-ratio: 14 / 9;
        background: var(--paper);
        border-bottom: 1px solid var(--line);
        display: block;
      }
      .body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 8px; }
      .title { font-size: 19px; margin: 0; font-weight: 700; }
      .desc { font-size: 14px; color: var(--soft); margin: 0; line-height: 1.45; }
      .actions { display: flex; gap: 8px; margin-top: 4px; }
      .btn {
        font: inherit; font-size: 13px; font-weight: 600;
        border: 1px solid var(--indigo); background: var(--indigo); color: #fff;
        padding: 6px 12px; border-radius: 8px; cursor: pointer;
      }
      .btn.ghost { background: #fff; color: var(--indigo); }
      pre.code {
        margin: 6px 0 0;
        background: #1f2430;
        color: #e8eaf0;
        border-radius: 10px;
        padding: 14px;
        overflow: auto;
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12.5px;
        line-height: 1.5;
        max-height: 320px;
      }
      footer { text-align: center; color: var(--soft); font-size: 13px; padding: 0 20px 50px; }
      footer a { color: var(--indigo); }
    </style>
  </head>
  <body>
    <header>
      <h1>Manim<span>.js</span></h1>
      <p>A Manim-inspired, framework-agnostic animation engine for the web.</p>
      <div class="install">npm i @agarwal29796/manim-js</div>
      <div class="links">
        <a class="primary" href="https://www.npmjs.com/package/@agarwal29796/manim-js">npm</a>
        <a href="https://github.com/agarwal29796/manim-js">GitHub</a>
        <a href="../studio/index.html">Live editor →</a>
      </div>
    </header>
    <main>
      <div id="grid"></div>
    </main>
    <footer>
      Every preview is produced by the exact code shown — compiled live with
      <a href="https://www.npmjs.com/package/@agarwal29796/manim-js">@agarwal29796/manim-js</a>.
    </footer>
    <script src="bundle.js"></script>
  </body>
</html>
