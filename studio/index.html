<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>motionlab studio</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #ece9e1;
        color: #20242e;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid #d9d5ca;
        background: #f6f4ee;
      }
      header h1 { font-size: 15px; font-weight: 700; margin: 0; letter-spacing: -0.2px; }
      header h1 span { color: #5b5bd6; }
      header .hint { font-size: 12px; color: #7c8194; margin-left: auto; }

      main {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      /* left: editor */
      .editor {
        width: 46%;
        min-width: 320px;
        display: flex;
        flex-direction: column;
        border-right: 1px solid #d9d5ca;
        background: #1f2430;
      }
      .editor textarea {
        flex: 1;
        resize: none;
        border: 0;
        outline: 0;
        padding: 16px;
        background: #1f2430;
        color: #e8eaf0;
        font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
        font-size: 13.5px;
        line-height: 1.55;
        tab-size: 2;
        white-space: pre;
        overflow: auto;
      }
      .status {
        font-family: "SFMono-Regular", Menlo, Consolas, monospace;
        font-size: 12px;
        padding: 8px 14px;
        border-top: 1px solid #2c3344;
        min-height: 34px;
        white-space: pre-wrap;
      }
      .status.ok { color: #6ee7b7; background: #1a2a23; }
      .status.err { color: #fda4a4; background: #2c1d1f; }

      /* right: preview */
      .preview {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: 22px;
        min-width: 0;
      }
      canvas {
        width: 100%;
        max-width: 760px;
        aspect-ratio: 16 / 9;
        border-radius: 12px;
        box-shadow: 0 16px 44px rgba(32, 36, 46, 0.18);
        background: #fbfaf6;
      }
      .controls {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        max-width: 760px;
      }
      button {
        font: inherit; font-weight: 600;
        padding: 7px 16px; border: 0; border-radius: 8px;
        background: #5b5bd6; color: #fff; cursor: pointer;
      }
      input[type="range"] { flex: 1; accent-color: #5b5bd6; }
      #time { font-variant-numeric: tabular-nums; color: #5a6072; min-width: 110px; text-align: right; font-size: 13px; }
    </style>
  </head>
  <body>
    <header>
      <h1>motion<span>lab</span> · studio</h1>
      <span class="hint">edit the code — it runs live · ⌘/Ctrl+Enter to force-run</span>
    </header>
    <main>
      <section class="editor">
        <textarea id="code" spellcheck="false" autocomplete="off" autocapitalize="off"></textarea>
        <div id="status" class="status ok">ready</div>
      </section>
      <section class="preview">
        <canvas id="stage"></canvas>
        <div class="controls">
          <button id="play">Pause</button>
          <input id="scrub" type="range" min="0" max="100" value="0" />
          <span id="time">0.00s</span>
        </div>
      </section>
    </main>
    <script src="bundle.js"></script>
  </body>
</html>
